<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d4263"/>
      <stop offset="60%" stop-color="#90b1cb"/>
      <stop offset="100%" stop-color="#c5d8e6"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a80a2"/>
      <stop offset="100%" stop-color="#243b55"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  
  <g opacity="0.3" fill="#ffffff">
    <path d="M 300 200 Q 350 180 400 200 Q 350 220 300 200" />
    <path d="M 450 250 Q 550 220 650 250 Q 550 280 450 250" />
    <path d="M 1200 150 Q 1300 130 1400 150 Q 1300 170 1200 150" />
  </g>

  <!-- Distant mountains / land -->
  <path d="M0 600 C300 550 500 580 800 600 C1100 620 1300 560 1600 590 L1600 900 L0 900 Z" fill="#4f6e8c" opacity="0.8"/>
  <path d="M0 620 C400 650 600 590 900 620 C1200 650 1400 600 1600 630 L1600 900 L0 900 Z" fill="#3b5671"/>

  <!-- Water -->
  <rect x="0" y="650" width="1600" height="250" fill="url(#water)"/>
  
  <!-- Tracks in water -->
  <g fill="none" stroke="#2a4563" stroke-width="4">
    <path d="M-100 850 L1700 850" />
    <path d="M-100 870 L1700 870" />
    <!-- Ties -->
    <path d="M200 840 L210 880" />
    <path d="M400 840 L410 880" />
    <path d="M600 840 L610 880" />
    <path d="M800 840 L810 880" />
    <path d="M1000 840 L1010 880" />
    <path d="M1200 840 L1210 880" />
    <path d="M1400 840 L1410 880" />
  </g>
</svg>

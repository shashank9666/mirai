<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#140026"/>
      <stop offset="50%" stop-color="#3b0066"/>
      <stop offset="100%" stop-color="#7a0016"/>
    </linearGradient>
    <linearGradient id="eva" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7aff33"/>
      <stop offset="100%" stop-color="#9d33ff"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Cross explosions / geometric background elements -->
  <g opacity="0.4" fill="none" stroke="#ff3333" stroke-width="4">
    <path d="M 800 100 L 800 800 M 450 450 L 1150 450" transform="rotate(45 800 450)" opacity="0.3" />
    <circle cx="800" cy="450" r="300" opacity="0.5" />
    <circle cx="800" cy="450" r="320" stroke-dasharray="10,20" opacity="0.7" />
  </g>

  <!-- Ground geometric lines -->
  <path d="M 0 750 L 1600 750" stroke="#7aff33" stroke-width="2" opacity="0.5"/>
  <g stroke="#7aff33" stroke-width="1" opacity="0.3">
    <path d="M 800 750 L -200 900" />
    <path d="M 800 750 L 200 900" />
    <path d="M 800 750 L 600 900" />
    <path d="M 800 750 L 1000 900" />
    <path d="M 800 750 L 1400 900" />
    <path d="M 800 750 L 1800 900" />
  </g>

  <rect x="750" y="300" width="100" height="450" fill="url(#eva)" opacity="0.9" />
  <polygon points="750,300 800,200 850,300" fill="#7aff33" />
  <circle cx="800" cy="270" r="10" fill="#ff3333" />
</svg>
